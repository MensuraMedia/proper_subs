<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 07 — Live End-to-End Subtitle Capture</title>
  <link rel="stylesheet" href="test07.css">
</head>
<body>
  <h1>Live End-to-End Subtitle Capture</h1>
  <p class="test-id">test07</p>

  <div class="player-wrapper" id="player">
    <video id="video" controls preload="metadata">
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      <track kind="subtitles" src="subtitles.vtt" srclang="ja" label="Japanese" default>
    </video>
    <!-- DOM overlay subtitle container (simulates what streaming sites do) -->
    <div class="subtitle-container" id="sub-container">
      <span class="subtitle-line" id="sub-line"></span>
    </div>
  </div>

  <!-- Self-detection panel -->
  <div class="status-panel">
    <h2>Detection</h2>
    <div class="check-row">
      <div class="check-box" id="chk-video">&#x2713;</div>
      <span class="check-label" id="lbl-video">Video Element</span>
      <span class="check-detail" id="det-video">--</span>
    </div>
    <div class="check-row">
      <div class="check-box" id="chk-src">&#x2713;</div>
      <span class="check-label" id="lbl-src">Video Source</span>
      <span class="check-detail" id="det-src">--</span>
    </div>
    <div class="check-row">
      <div class="check-box" id="chk-tracks">&#x2713;</div>
      <span class="check-label" id="lbl-tracks">Text Tracks</span>
      <span class="check-detail" id="det-tracks">--</span>
    </div>
    <div class="check-row">
      <div class="check-box" id="chk-dom">&#x2713;</div>
      <span class="check-label" id="lbl-dom">DOM Subtitle Container</span>
      <span class="check-detail" id="det-dom">--</span>
    </div>
    <div class="check-row">
      <div class="check-box" id="chk-capture">&#x2713;</div>
      <span class="check-label" id="lbl-capture">Subtitle Cues Fired</span>
      <span class="check-detail" id="det-capture">--</span>
    </div>
  </div>

  <div class="log-area" id="log"></div>

  <script src="common.js"></script>
  <script src="test07.js"></script>
</body>
</html>
