<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 06 — Timeout &amp; Error Handling</title>
  <link rel="stylesheet" href="common.css">
  <style>
    input[type="text"], input[type="password"] { width:100%;background:#141414;color:#e0e0e0;border:1px solid #2a2a2a;padding:8px;font-size:13px;margin:4px 0 12px;font-family:inherit; }
    input:focus { border-color:#d4a017;outline:none; }
    label { font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.8px; }
    select { background:#141414;color:#e0e0e0;border:1px solid #2a2a2a;padding:6px 8px;font-size:12px;font-family:inherit; }
  </style>
</head>
<body>
  <h1>Timeout &amp; Error Handling</h1>
  <p class="test-id">test06</p>
  <div class="sim-area">
    <div class="sim-label">Configuration (needed for live timeout test)</div>
    <label>Provider</label>
    <select id="provider">
      <option value="groq">Groq</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Claude</option>
      <option value="gemini">Gemini</option>
    </select>
    <br><br>
    <label>API Key (optional — only needed for live timeout test)</label>
    <input type="password" id="api-key" placeholder="Leave blank to skip live tests">
  </div>

  <button id="btn-run">Run Timeout &amp; Error Tests</button>
  <div id="results"></div>
  <div class="log-area" id="log"></div>

  <script src="common.js"></script>
  <script src="test-timeout.js"></script>
</body>
</html>
