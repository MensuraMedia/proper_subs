<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 06 — Timeout &amp; Error Handling</title>
  <link rel="stylesheet" href="common.css">
  <style>
    input[type="text"], input[type="password"] { width:100%;background:#141414;color:#e0e0e0;border:1px solid #2a2a2a;padding:8px;font-size:13px;margin:4px 0 12px;font-family:inherit; }
    input:focus { border-color:#d4a017;outline:none; }
    label { font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.8px; }
    select { background:#141414;color:#e0e0e0;border:1px solid #2a2a2a;padding:6px 8px;font-size:12px;font-family:inherit; }
  </style>
</head>
<body>
  <h1>Timeout &amp; Error Handling</h1>
  <p class="test-id">test06</p>
  <div class="sim-area">
    <div class="sim-label">Configuration (needed for live timeout test)</div>
    <label>Provider</label>
    <select id="provider">
      <option value="groq">Groq</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Claude</option>
      <option value="gemini">Gemini</option>
    </select>
    <br><br>
    <label>API Key (optional — only needed for live timeout test)</label>
    <input type="password" id="api-key" placeholder="Leave blank to skip live tests">
  </div>

  <button id="btn-run">Run Timeout &amp; Error Tests</button>
  <div id="results"></div>
  <div class="log-area" id="log"></div>

  <script src="common.js"></script>
  <script>
    document.getElementById('btn-run').addEventListener('click', async () => {
      const t = new TestRunner();
      const log = msg => appendLog('log', msg);
      const provider = document.getElementById('provider').value;
      const apiKey = document.getElementById('api-key').value;

      // ── Test 1: AbortController basics ──
      log('--- AbortController Tests ---');
      {
        const controller = new AbortController();
        t.assert(controller.signal instanceof AbortSignal, 'AbortController creates AbortSignal');
        t.assert(!controller.signal.aborted, 'Signal not aborted initially');
        controller.abort();
        t.assert(controller.signal.aborted, 'Signal aborted after abort()');
      }

      // ── Test 2: Fetch abort via timeout ──
      log('\n--- Fetch Abort ---');
      {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 50); // 50ms timeout

        const start = performance.now();
        try {
          // Use a slow endpoint that will definitely exceed 50ms
          await fetch('https://httpbin.org/delay/10', { signal: controller.signal });
          t.fail('Fetch should have been aborted');
        } catch (e) {
          const elapsed = (performance.now() - start).toFixed(0);
          t.assert(e.name === 'AbortError', 'Fetch throws AbortError on timeout', `${elapsed}ms`);
          log(`AbortError caught after ${elapsed}ms`);
        }
      }

      // ── Test 3: Timeout race with clearTimeout cleanup ──
      log('\n--- Timeout Cleanup ---');
      {
        let timeoutFired = false;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => { timeoutFired = true; controller.abort(); }, 100);

        // Simulate fast response — clear timeout before it fires
        clearTimeout(timeoutId);
        await new Promise(r => setTimeout(r, 200));
        t.assert(!timeoutFired, 'Timeout cleared before firing — no abort');
        t.assert(!controller.signal.aborted, 'Signal remains clean after clearTimeout');
      }

      // ── Test 4: Invalid API key error handling ──
      log('\n--- Invalid API Key ---');
      {
        const start = performance.now();
        try {
          const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer invalid-key-12345'
            },
            body: JSON.stringify({
              model: 'llama-3.3-70b-versatile',
              messages: [{ role: 'user', content: 'test' }],
              max_tokens: 10
            })
          });
          const elapsed = (performance.now() - start).toFixed(0);
          t.assert(!res.ok, `Invalid key returns error status`, `${res.status} (${elapsed}ms)`);
          t.assert(res.status === 401 || res.status === 403, 'Status is 401 or 403', `${res.status}`);
          log(`Invalid key → ${res.status} (${elapsed}ms)`);
        } catch (e) {
          t.warn('Network error on invalid key test', e.message);
        }
      }

      // ── Test 5: [inaudible] constant ──
      log('\n--- [inaudible] Handling ---');
      {
        const INAUDIBLE = '[ inaudible ]';
        t.assert(INAUDIBLE === '[ inaudible ]', '[inaudible] constant matches expected value');
        t.assert(INAUDIBLE.length === 13, '[inaudible] correct length', INAUDIBLE.length);

        // Simulate the timeout → inaudible flow
        async function simulateTransform(timeoutMs) {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

          try {
            // Simulate a slow LLM that takes 500ms
            await new Promise((resolve, reject) => {
              controller.signal.addEventListener('abort', () => reject(new DOMException('Aborted', 'AbortError')));
              setTimeout(resolve, 500);
            });
            return 'I wa apple o eat.';
          } catch (e) {
            if (e.name === 'AbortError') return INAUDIBLE;
            throw e;
          } finally {
            clearTimeout(timeoutId);
          }
        }

        // With 100ms timeout → should get [inaudible]
        const fast = await simulateTransform(100);
        t.assert(fast === INAUDIBLE, 'Short timeout → [inaudible]', fast);

        // With 1000ms timeout → should get real result
        const slow = await simulateTransform(1000);
        t.assert(slow !== INAUDIBLE, 'Long timeout → real result', slow);
      }

      // ── Test 6: Response validation (optional chaining) ──
      log('\n--- Response Validation ---');
      {
        const badResponses = [
          { data: {}, desc: 'Empty object' },
          { data: { choices: [] }, desc: 'Empty choices array' },
          { data: { choices: [{}] }, desc: 'Choice without message' },
          { data: { choices: [{ message: {} }] }, desc: 'Message without content' },
          { data: null, desc: 'Null response' },
        ];

        for (const { data, desc } of badResponses) {
          const content = data?.choices?.[0]?.message?.content;
          t.assert(content === undefined || content === null, `Bad response handled: ${desc}`, content ?? '(undefined)');
        }

        // Good response
        const good = { choices: [{ message: { content: 'I wa apple o eat.' } }] };
        const content = good?.choices?.[0]?.message?.content?.trim();
        t.assert(content === 'I wa apple o eat.', 'Good response parsed correctly', content);
      }

      // ── Test 7: Live timeout test (if API key provided) ──
      if (apiKey) {
        log('\n--- Live Timeout Test ---');

        // Test with very short timeout — should get [inaudible]
        const INAUDIBLE = '[ inaudible ]';
        const controller1 = new AbortController();
        const timeoutId1 = setTimeout(() => controller1.abort(), 50); // 50ms — will timeout

        const start1 = performance.now();
        try {
          const apiUrl = provider === 'groq' ? 'https://api.groq.com/openai/v1/chat/completions' : 'https://api.openai.com/v1/chat/completions';
          await fetch(apiUrl, {
            method: 'POST',
            signal: controller1.signal,
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: provider === 'groq' ? 'llama-3.3-70b-versatile' : 'gpt-4o-mini',
              messages: [{ role: 'user', content: '私はリンゴを食べます。' }],
              max_tokens: 50
            })
          });
          clearTimeout(timeoutId1);
          const elapsed = (performance.now() - start1).toFixed(0);
          t.warn('50ms timeout did not fire — API was faster than expected', `${elapsed}ms`);
        } catch (e) {
          clearTimeout(timeoutId1);
          const elapsed = (performance.now() - start1).toFixed(0);
          t.assert(e.name === 'AbortError', 'Live 50ms timeout → AbortError', `${elapsed}ms`);
          log(`Live timeout caught: ${e.name} (${elapsed}ms)`);
        }

        // Test with generous timeout — should succeed
        const controller2 = new AbortController();
        const timeoutId2 = setTimeout(() => controller2.abort(), 10000);
        const start2 = performance.now();
        try {
          const apiUrl = provider === 'groq' ? 'https://api.groq.com/openai/v1/chat/completions' : 'https://api.openai.com/v1/chat/completions';
          const res = await fetch(apiUrl, {
            method: 'POST',
            signal: controller2.signal,
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: provider === 'groq' ? 'llama-3.3-70b-versatile' : 'gpt-4o-mini',
              messages: [{ role: 'user', content: '私はリンゴを食べます。' }],
              max_tokens: 50
            })
          });
          clearTimeout(timeoutId2);
          const elapsed = (performance.now() - start2).toFixed(0);
          if (res.ok) {
            const data = await res.json();
            const output = data?.choices?.[0]?.message?.content?.trim();
            t.pass(`Live 10s timeout → success`, `${elapsed}ms: ${output?.slice(0, 40)}`);
          } else {
            t.fail(`Live request failed`, `${res.status} (${elapsed}ms)`);
          }
        } catch (e) {
          clearTimeout(timeoutId2);
          t.fail('Live generous timeout failed', e.message);
        }
      } else {
        t.info('No API key — skipping live timeout tests');
      }

      t.summary();
    });
  </script>
</body>
</html>
