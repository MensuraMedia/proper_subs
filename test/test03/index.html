<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 03 — LLM Provider Pipeline</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="test03.css">
</head>
<body>
  <h1>LLM Provider Pipeline</h1>
  <p class="test-id">test03</p>
  <div class="sim-area">
    <div class="sim-label">Configuration</div>
    <label>Provider</label>
    <select id="provider">
      <option value="groq">Groq</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Claude (Anthropic)</option>
      <option value="gemini">Gemini</option>
    </select>
    <br><br>
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="Paste API key for selected provider">
    <label>Timeout (ms)</label>
    <input type="text" id="timeout" value="5000" placeholder="5000">
  </div>

  <button id="btn-run">Run LLM Tests</button>
  <button id="btn-all">Test All Sentences</button>
  <div id="results"></div>

  <div class="provider-grid" id="provider-results"></div>
  <div class="log-area" id="log"></div>

  <script src="common.js"></script>
  <script src="test-llm.js"></script>
</body>
</html>
