<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 03 — LLM Provider Pipeline</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
    .provider-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; }
    .provider-card h3 { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
    .provider-card .result-text { font-family: var(--mono); font-size: 12px; color: var(--muted); min-height: 40px; }
    .provider-card .latency { font-size: 11px; margin-top: 6px; }
    .provider-card.success .latency { color: var(--pass); }
    .provider-card.error .latency { color: var(--fail); }
    input[type="text"], input[type="password"] { width: 100%; background: #141414; color: var(--text); border: 1px solid var(--border); padding: 8px; font-size: 13px; margin: 4px 0 12px; font-family: inherit; }
    input:focus { border-color: var(--accent); outline: none; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    select { background: #141414; color: var(--text); border: 1px solid var(--border); padding: 6px 8px; font-size: 12px; font-family: inherit; }
  </style>
</head>
<body>
  <h1>LLM Provider Pipeline</h1>
  <p class="test-id">test03</p>
  <div class="sim-area">
    <div class="sim-label">Configuration</div>
    <label>Provider</label>
    <select id="provider">
      <option value="groq">Groq</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Claude (Anthropic)</option>
      <option value="gemini">Gemini</option>
    </select>
    <br><br>
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="Paste API key for selected provider">
    <label>Timeout (ms)</label>
    <input type="text" id="timeout" value="5000" placeholder="5000">
  </div>

  <button id="btn-run">Run LLM Tests</button>
  <button id="btn-all">Test All Sentences</button>
  <div id="results"></div>

  <div class="provider-grid" id="provider-results"></div>
  <div class="log-area" id="log"></div>

  <script src="common.js"></script>
  <script src="test-llm.js"></script>
</body>
</html>
