<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 02</title>
  <link rel="stylesheet" href="common.css">
  <style>body { width: 280px; padding: 16px; }
  h1 { font-size: 14px; margin-bottom: 8px; }
  p { font-size: 12px; color: #888; }</style>
</head>
<body>
  <h1 style="color:#d4a017">Test 02 — Subtitle Capture</h1>
  <p>This test runs in a full page. Click below to open it.</p>
  <button id="open" style="margin-top:12px;width:100%">Open Test Page</button>
  <script>
    document.getElementById('open').addEventListener('click', () => {
      chrome.tabs.create({ url: chrome.runtime.getURL('index.html') });
    });
  </script>
</body>
</html>
