<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 04 — Display Renderer &amp; Particle Coloring</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .render-box {
      background: #000;
      min-height: 60px;
      padding: 16px;
      text-align: center;
      margin: 8px 0;
      border: 1px solid #2a2a2a;
      position: relative;
      font-size: 18px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }
    .render-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: none;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>Display Renderer &amp; Particle Coloring</h1>
  <p class="test-id">test04</p>
  <div class="description">
    Tests the subtitle display engine: particle color-coding accuracy, escapeHtml XSS prevention,
    dual/overlay mode rendering, and custom color validation. Visual inspection + automated assertions.
  </div>

  <div id="renders"></div>
  <button id="btn-run">Run Display Tests</button>
  <div id="results"></div>

  <script src="common.js"></script>
  <script>
    const PARTICLE_COLORS = {
      wa: '#5b9bd5', ga: '#5b9bd5', o: '#e06666', wo: '#e06666',
      ni: '#6aa84f', de: '#d4a017', kara: '#b07cd8', made: '#b07cd8',
      to: '#e69138', mo: '#5b9bd5', no: '#999999', he: '#6aa84f',
      e: '#6aa84f', yo: '#cc6699', ne: '#cc6699', ka: '#cc6699'
    };

    const PARTICLE_REGEX = new RegExp(
      '\\b(' + Object.keys(PARTICLE_COLORS).join('|') + ')\\b', 'gi'
    );

    const VALID_COLOR = /^#[0-9a-fA-F]{3,8}$/;

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function colorizeParticles(text) {
      return escapeHtml(text).replace(PARTICLE_REGEX, (match) => {
        const lower = match.toLowerCase();
        const color = PARTICLE_COLORS[lower] || '#999';
        return `<span style="color:${color};font-weight:700">${match}</span>`;
      });
    }

    function addRenderBox(container, label, html) {
      const box = document.createElement('div');
      box.className = 'render-box';
      box.innerHTML = `<div class="render-label">${escapeHtml(label)}</div>${html}`;
      container.appendChild(box);
      return box;
    }

    document.getElementById('btn-run').addEventListener('click', () => {
      const t = new TestRunner();
      const renders = document.getElementById('renders');
      renders.innerHTML = '';

      // ── Particle coloring ──
      const testLines = [
        { input: 'I wa apple o eat.', particles: ['wa', 'o'], label: 'Basic particles' },
        { input: 'She ga school ni running went', particles: ['ga', 'ni'], label: 'ga + ni' },
        { input: 'Tomorrow kara Tokyo de work', particles: ['kara', 'de'], label: 'kara + de' },
        { input: 'Friend to movie o see ni went', particles: ['to', 'o', 'ni'], label: 'Multiple particles' },
        { input: 'I mo cat mo like', particles: ['mo', 'mo'], label: 'Double mo' },
        { input: 'Japan no study wa difficult ka', particles: ['no', 'wa', 'ka'], label: 'no + wa + ka' },
      ];

      for (const test of testLines) {
        const html = colorizeParticles(test.input);
        addRenderBox(renders, test.label, html);

        // Verify particles are wrapped in spans
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const spans = tempDiv.querySelectorAll('span[style]');
        const coloredWords = Array.from(spans).map(s => s.textContent.toLowerCase());

        for (const p of test.particles) {
          t.assert(coloredWords.includes(p), `${test.label}: "${p}" is colored`, PARTICLE_COLORS[p]);
        }
      }

      // ── Dual mode rendering ──
      const dualHtml =
        `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">` +
          `<div style="font-size:0.85em;opacity:0.6;color:#999">${escapeHtml('私はリンゴを食べます。')}</div>` +
          `<div>${colorizeParticles('I wa apple o eat.')}</div>` +
        `</div>`;
      addRenderBox(renders, 'Dual mode (JP original + structured)', dualHtml);
      t.pass('Dual mode renders without error');

      // ── [inaudible] rendering ──
      const inaudibleHtml = `<span style="color:#555;font-style:italic;font-size:0.9em">${escapeHtml('[ inaudible ]')}</span>`;
      addRenderBox(renders, '[inaudible] timeout fallback', inaudibleHtml);
      t.pass('[inaudible] renders with dimmed styling');

      // ── XSS prevention ──
      const xssTests = [
        '<script>alert("xss")</script>',
        '<img src=x onerror=alert(1)>',
        'I wa" onclick="alert(1)" data-x="apple o eat',
        '"><svg/onload=alert(1)>',
      ];

      for (const xss of xssTests) {
        const escaped = escapeHtml(xss);
        t.assert(!escaped.includes('<script'), `XSS blocked: script tag`, xss.slice(0, 30));
        t.assert(!escaped.includes('onerror'), `XSS blocked: event handler`, xss.slice(0, 30));
        t.assert(!escaped.includes('onclick'), `XSS blocked: onclick`, xss.slice(0, 30));

        // Render it — should be safe
        addRenderBox(renders, `XSS test: ${xss.slice(0, 25)}...`, colorizeParticles(xss));
      }

      // ── Custom color validation ──
      const colorTests = [
        ['#ff0000', true], ['#abc', true], ['#aabbcc', true], ['#aabbccdd', true],
        ['red', false], ['rgb(255,0,0)', false],
        ['#abc;"><script>alert(1)</script>', false],
        ['#abc" onclick="alert(1)', false],
        ['', false], ['not-a-color', false]
      ];

      for (const [color, expected] of colorTests) {
        const valid = VALID_COLOR.test(color);
        t.assert(valid === expected, `Color validation: "${color}"`, valid ? 'valid' : 'rejected');
      }

      t.summary();
    });
  </script>
</body>
</html>
