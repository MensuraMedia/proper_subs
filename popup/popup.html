<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>Proper Subs</h1>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div id="site-badge" class="site-badge hidden"></div>

    <!-- Detection Checklist -->
    <div class="section-label">Detection Status</div>
    <div class="detection-list">
      <div class="detect-row">
        <div class="detect-check" id="chk-video">&#x2713;</div>
        <span class="detect-label" id="lbl-video">Video Page</span>
        <span class="detect-detail" id="det-video">--</span>
      </div>
      <div class="detect-row">
        <div class="detect-check" id="chk-stream">&#x2713;</div>
        <span class="detect-label" id="lbl-stream">Video Stream</span>
        <span class="detect-detail" id="det-stream">--</span>
      </div>
      <div class="detect-row">
        <div class="detect-check" id="chk-audio">&#x2713;</div>
        <span class="detect-label" id="lbl-audio">Audio Stream</span>
        <span class="detect-detail" id="det-audio">--</span>
      </div>
      <div class="detect-row">
        <div class="detect-check" id="chk-subs">&#x2713;</div>
        <span class="detect-label" id="lbl-subs">Subtitle Stream</span>
        <span class="detect-detail" id="det-subs">--</span>
      </div>
      <div class="detect-row">
        <div class="detect-check" id="chk-convert">&#x2713;</div>
        <span class="detect-label" id="lbl-convert">Audio Conversion</span>
        <span class="detect-detail" id="det-convert">planned</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="control-row">
        <label>Mode</label>
        <select id="display-mode">
          <option value="replace">Replace</option>
          <option value="dual">Dual (JP + EN)</option>
          <option value="overlay">Overlay</option>
        </select>
      </div>

      <div class="control-row">
        <label>Provider</label>
        <select id="provider">
          <option value="groq">Groq (fastest)</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Claude</option>
          <option value="gemini">Gemini</option>
        </select>
      </div>

      <div class="control-row">
        <label>Particles</label>
        <label class="toggle small">
          <input type="checkbox" id="particle-colors" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Capture status -->
    <div class="section-label">Last Captured Cue</div>
    <div class="capture-info">
      <div class="cue-count" id="cue-count">0 cues captured</div>
      <div class="last-cue" id="last-cue">--</div>
    </div>

    <div class="footer">
      <button id="btn-options">Options</button>
      <button id="btn-test">Test API</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
